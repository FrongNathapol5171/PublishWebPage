<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #eef1f4;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
    }

    .page {
      width: 410px;
      max-width: calc(100vw - 24px);
      background: #f7f7f7;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }

    .topbar {
      background: #0f4b8f;
      color: #fff;
      padding: 14px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .logo {
      width: 40px;
      height: 40px;
      border: 2px solid rgba(255,255,255,0.8);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 700;
      flex-shrink: 0;
    }

    .brand {
      line-height: 1.2;
    }

    .brand .th {
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 3px;
    }

    .brand .en {
      font-size: 12px;
      opacity: 0.9;
    }

    .content {
      padding: 34px 28px 42px;
      text-align: center;
      background: #f6f6f6;
    }

    .icon-wrap {
      width: 70px;
      height: 70px;
      margin: 0 auto 14px;
      border-radius: 50%;
      background: #dfe8cf;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .icon {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: #78a52e;
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 700;
    }

    .status-pill {
      display: inline-block;
      padding: 5px 14px;
      border-radius: 999px;
      background: #e7eed8;
      color: #6c8b2a;
      font-size: 13px;
      font-weight: 700;
      margin-bottom: 16px;
    }

    h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 700;
      color: #2d2d2d;
    }

    .subtitle {
      margin-top: 8px;
      font-size: 16px;
      color: #666;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #78a52e;
      margin: 18px auto 22px;
      border-radius: 999px;
    }

    .message-th {
      font-size: 15px;
      line-height: 1.7;
      color: #4f4f4f;
      margin-bottom: 10px;
      font-weight: 600;
    }

    .message-en {
      font-size: 14px;
      line-height: 1.7;
      color: #8b8b8b;
    }

    @media (max-width: 480px) {
      .content {
        padding: 30px 20px 36px;
      }

      .brand .th {
        font-size: 13px;
      }

      h1 {
        font-size: 18px;
      }

      .subtitle {
        font-size: 15px;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo">SIPH</div>
      <div class="brand">
        <div class="th">โรงพยาบาลศิริราช ปิยมหาราชการุณย์</div>
        <div class="en">Siriraj Piyamaharajkarun Hospital</div>
      </div>
    </div>

    <div class="content">
      <div class="icon-wrap">
        <div class="icon">✓</div>
      </div>

      <div class="status-pill">สำเร็จ · Success</div>

      <h1>ชำระเงินเรียบร้อย</h1>
      <div class="subtitle">Payment Successful</div>

      <div class="divider"></div>

      <div class="message-th">
        การชำระเงินของท่านเสร็จสมบูรณ์แล้ว<br />
        ขอบคุณที่ใช้บริการ
      </div>

      <div class="message-en">
        Your payment has been completed successfully.<br />
        Thank you for your payment.
      </div>
    </div>
  </div>
</body>
</html>
