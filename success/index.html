<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Payment Successful</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Text:wght@400;500;700&family=Noto+Sans+Thai:wght@400;500;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Google Sans", "Google Sans Text", "Noto Sans Thai", Arial, Helvetica, sans-serif;
      background: linear-gradient(180deg, #eef1f4 0%, #e6edf7 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      padding: clamp(16px, 4vw, 40px);
    }

    .page {
      width: min(100%, 460px);
      background: #ffffff;
      border-radius: 24px;
      overflow: hidden;
      box-shadow: 0 18px 48px rgba(15, 75, 143, 0.14);
    }

    .topbar {
      background: #0f4b8f;
      color: #fff;
      padding: clamp(16px, 2.6vw, 22px) clamp(18px, 3vw, 26px);
      display: flex;
      align-items: center;
      gap: clamp(12px, 2vw, 16px);
    }

    .logo {
      width: clamp(40px, 7vw, 48px);
      height: clamp(40px, 7vw, 48px);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
      background: #fff;
      padding: 3px;
      box-shadow: inset 0 0 0 2px rgba(255,255,255,0.8);
    }

    .logo img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      border-radius: 50%;
    }

    .brand {
      line-height: 1.2;
      min-width: 0;
    }

    .brand .th {
      font-size: clamp(13px, 1.7vw, 15px);
      font-weight: 700;
      margin-bottom: 3px;
    }

    .brand .en {
      font-size: clamp(11px, 1.4vw, 13px);
      opacity: 0.9;
    }

    .content {
      padding: clamp(30px, 5vw, 42px) clamp(22px, 5vw, 34px) clamp(34px, 6vw, 46px);
      text-align: center;
      background: #ffffff;
    }

    .icon-wrap {
      width: clamp(150px, 42vw, 210px);
      height: clamp(150px, 42vw, 210px);
      margin: 0 auto 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: visible;
    }

    .icon {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      object-position: center;
    }

    .status-pill {
      display: inline-block;
      padding: 6px 16px;
      border-radius: 999px;
      background: #e7eed8;
      color: #6c8b2a;
      font-size: clamp(13px, 1.8vw, 14px);
      font-weight: 700;
      margin-bottom: 16px;
      align-self: center;
    }

    h1 {
      margin: 0;
      font-size: clamp(22px, 3.2vw, 28px);
      font-weight: 700;
      color: #2d2d2d;
    }

    .subtitle {
      margin-top: 8px;
      font-size: clamp(15px, 2.2vw, 18px);
      color: #666;
    }

    .divider {
      width: 40px;
      height: 2px;
      background: #78a52e;
      margin: 18px auto 22px;
      border-radius: 999px;
    }

    .message-th {
      max-width: 30rem;
      margin: 0 auto 10px;
      font-size: clamp(15px, 2vw, 16px);
      line-height: 1.7;
      color: #4f4f4f;
      font-weight: 600;
    }

    .message-en {
      max-width: 30rem;
      margin: 0 auto;
      font-size: clamp(14px, 1.9vw, 15px);
      line-height: 1.7;
      color: #8b8b8b;
    }

    @media (min-width: 768px) {
      .page {
        width: min(100%, 520px);
      }

      .content {
        padding: 42px 40px 48px;
      }
    }

    @media (max-width: 480px) {
      body {
        padding: 12px;
        align-items: center;
      }

      .page {
        width: 100%;
        min-height: calc(100vh - 24px);
        border-radius: 24px;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        align-items: flex-start;
      }

      .content {
        flex: 1;
        padding: 28px 20px 36px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .brand .th {
        font-size: 13px;
      }

      h1 {
        font-size: 18px;
      }

      .subtitle {
        font-size: 15px;
      }

      .message-th br,
      .message-en br {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="topbar">
      <div class="logo">
        <img src="../static/SIPH-Logo.png" alt="SIPH Logo" />
      </div>
      <div class="brand">
        <div class="th">โรงพยาบาลศิริราช ปิยมหาราชการุณย์</div>
        <div class="en">Siriraj Piyamaharajkarun Hospital</div>
      </div>
    </div>

    <div class="content">
      <div class="icon-wrap">
        <img class="icon" src="../static/siph_success.png" alt="Success status" />
      </div>

      <div class="status-pill">สำเร็จ · Success</div>

      <h1>ชำระเงินเรียบร้อย</h1>
      <div class="subtitle">Payment Successful</div>

      <div class="divider"></div>

      <div class="message-th">
        การชำระเงินของท่านเสร็จสมบูรณ์แล้ว<br />
        ขอบคุณที่ใช้บริการ
      </div>

      <div class="message-en">
        Your payment has been completed successfully.<br />
        Thank you for your payment.
      </div>
    </div>
  </div>
</body>
</html>
