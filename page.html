<!doctype html>
<html lang="th">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Copy Text</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f7fb;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
    }
    .card {
      width: 92%;
      max-width: 420px;
      background: #fff;
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(0,0,0,.08);
      padding: 24px;
      text-align: center;
    }
    .value {
      font-size: 24px;
      font-weight: 700;
      color: #1f3c88;
      background: #f3f6ff;
      border-radius: 12px;
      padding: 14px;
      margin: 16px 0;
      word-break: break-all;
    }
    button {
      border: 0;
      background: #1f3c88;
      color: #fff;
      padding: 12px 18px;
      border-radius: 12px;
      font-size: 16px;
      cursor: pointer;
    }
    .msg {
      margin-top: 12px;
      color: #0a7a35;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="card">
    <h2>คัดลอกข้อมูล</h2>
    <div id="value" class="value">-</div>
    <button onclick="copyText()">Copy to Clipboard</button>
    <div id="msg" class="msg"></div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const text = params.get("text") || "";
    document.getElementById("value").textContent = text || "ไม่พบข้อมูล";

    async function copyText() {
      try {
        await navigator.clipboard.writeText(text);
        document.getElementById("msg").textContent = "คัดลอกแล้ว";
      } catch (e) {
        document.getElementById("msg").textContent = "คัดลอกไม่สำเร็จ";
      }
    }
  </script>
</body>
</html>
